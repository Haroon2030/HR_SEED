<style>
    .hr-report { max-width: 80rem; margin-inline: auto; }

    .hr-report-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
    }
    .hr-report-top h1 {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 700;
        color: #0f172a;
    }
    .hr-report-crumb {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.7rem;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 0.15rem;
    }
    .hr-report-crumb a { color: inherit; text-decoration: none; }
    .hr-report-crumb a:hover { color: #2563eb; }
    .hr-report-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .hr-report-kpis {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    .hr-report-kpi {
        flex: 1 1 8rem;
        min-width: 7rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: #fff;
    }
    .hr-report-kpi .lbl {
        margin: 0;
        font-size: 0.65rem;
        font-weight: 600;
        color: #64748b;
    }
    .hr-report-kpi .val {
        margin: 0.1rem 0 0;
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.2;
        color: #0f172a;
    }
    .hr-report-kpi .sub {
        margin: 0.15rem 0 0;
        font-size: 0.6rem;
        font-weight: 600;
        color: #94a3b8;
    }

    .hr-report-filter {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 0.625rem;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
    }

    .hr-filter-grid {
        display: grid;
        gap: 0.5rem;
        align-items: stretch;
    }
    .hr-filter-grid--main {
        grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
        .hr-filter-grid--main {
            grid-template-columns: minmax(12rem, 1.1fr) minmax(9rem, 0.9fr) minmax(10rem, 1.2fr) auto;
        }
    }
    @media (min-width: 1024px) {
        .hr-filter-grid--main {
            grid-template-columns: minmax(14rem, 1fr) minmax(10rem, 0.85fr) minmax(12rem, 1.15fr) minmax(11rem, auto);
        }
    }
    .hr-filter-grid--adv {
        grid-template-columns: 1fr;
        padding-top: 0.65rem;
        border-top: 1px solid #e2e8f0;
    }
    @media (min-width: 768px) {
        .hr-filter-grid--adv {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
    }

    .hr-filter-slot {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        min-width: 0;
        padding: 0.55rem 0.65rem;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
    }
    .hr-filter-slot--period { padding-bottom: 0.5rem; }
    .hr-filter-slot--actions {
        background: #fff;
        border-color: #cbd5e1;
    }
    .hr-filter-slot--employee { min-height: 4.25rem; }
    .hr-filter-slot__title {
        font-size: 0.625rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #64748b;
        line-height: 1;
    }
    .hr-filter-slot__title--muted { margin-bottom: 0.1rem; }
    .hr-filter-slot__row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.45rem;
    }
    .hr-filter-cell {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        min-width: 0;
    }

    .hr-report-lbl {
        display: block;
        margin: 0;
        font-size: 0.65rem;
        font-weight: 700;
        color: #475569;
        line-height: 1.2;
    }
    .hr-report-field {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 0.45rem 0.55rem;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        border-radius: 0.375rem;
        background: #fff;
        min-height: 2.125rem;
    }
    .hr-report-field:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .hr-filter-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        margin-top: auto;
    }
    /* أزرار الفلتر — migrated to hr-btn via filter_actions.html */
    .hr-report-filter-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.4rem 0.65rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: #475569;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        background: #f8fafc;
        cursor: pointer;
    }
    .hr-report-filter-toggle:hover { background: #f1f5f9; }
    .hr-report-filter-toggle.is-active {
        border-color: #93c5fd;
        background: #eff6ff;
        color: #1d4ed8;
    }
    .hr-report-filter-toggle .dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: #2563eb;
    }

    /* تبويبات التقرير — أنماط hr-tab-btn في hr-ui.css */

    .hr-report-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 0.625rem;
        overflow: hidden;
    }
    .hr-report-card-hd {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.55rem 0.85rem;
        border-bottom: 1px solid #e2e8f0;
    }
    .hr-report-card-hd h2 {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 700;
        color: #0f172a;
    }
    .hr-report-card-hd .meta {
        font-size: 0.7rem;
        font-weight: 600;
        color: #64748b;
    }

    .hr-report-tbl { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .hr-report-tbl thead th {
        padding: 0.5rem 0.65rem;
        text-align: right;
        font-size: 0.68rem;
        font-weight: 700;
        color: #64748b;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        white-space: nowrap;
    }
    .hr-report-tbl tbody td {
        padding: 0.45rem 0.65rem;
        border-bottom: 1px solid #f1f5f9;
        color: #0f172a;
        font-weight: 600;
        vertical-align: middle;
    }
    .hr-report-tbl tbody tr:hover { background: #f8fafc; }
    .hr-report-tbl tbody tr.row-warn { background: #fffbeb; }
    .hr-report-tbl .mono {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .hr-report-badge {
        display: inline-flex;
        padding: 0.12rem 0.45rem;
        border-radius: 0.25rem;
        font-size: 0.65rem;
        font-weight: 700;
    }
    .hr-report-badge-ok { background: #ecfdf5; color: #047857; }
    .hr-report-badge-warn { background: #fffbeb; color: #b45309; }
    .hr-report-badge-muted { background: #f1f5f9; color: #475569; }
    .hr-report-badge-in { background: #ecfdf5; color: #047857; }
    .hr-report-badge-out { background: #eff6ff; color: #2563eb; }
    .hr-report-link { color: #2563eb; font-weight: 700; text-decoration: none; }
    .hr-report-link:hover { text-decoration: underline; }
    .hr-report-sub { display: block; font-size: 0.65rem; color: #64748b; font-family: ui-monospace, monospace; }
    .hr-report-pager {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        align-items: center;
        padding: 0.65rem 0.85rem;
        border-top: 1px solid #e2e8f0;
    }
    .hr-report-empty {
        padding: 2rem 1rem;
        text-align: center;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #64748b;
    }
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker {
        margin: 0;
    }
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker > label {
        margin-bottom: 0.2rem;
        font-size: 0.65rem;
        font-weight: 700;
        color: #475569;
    }
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker label span.text-slate-400,
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker label i { display: none; }
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker input[type="text"] {
        padding: 0.45rem 0.55rem 0.45rem 2rem;
        font-size: 0.8125rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.375rem;
        min-height: 2.125rem;
    }
    .hr-report-filter .hr-filter-slot--employee .employee-search-picker template + div > div {
        margin-bottom: 0;
    }
</style>
