{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-xl font-bold text-slate-900 mb-6">
            {% if bank %}تعديل بنك{% else %}إضافة بنك جديد{% endif %}
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="tab" value="{{ tab|default:'banks' }}">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">رقم البنك *</label>
                <input type="text" name="code" value="{{ bank.code|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">اسم البنك *</label>
                <input type="text" name="name" value="{{ bank.name|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            {% include "components/setup_form_actions.html" with default_tab="banks" %}
        </form>
    </div>
</div>
{% endblock %}
