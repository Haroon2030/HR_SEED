{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-xl font-bold text-slate-900 mb-6">
            {% if administration %}تعديل إدارة{% else %}إضافة إدارة جديدة{% endif %}
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="tab" value="{{ tab }}">
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">رقم الإدارة *</label>
                <input type="text" name="code" value="{{ administration.code|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">اسم الإدارة *</label>
                <input type="text" name="name" value="{{ administration.name|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">مدير الإدارة</label>
                <select name="manager"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    <option value="">-- بدون مدير --</option>
                    {% for user in form.fields.manager.queryset %}
                    <option value="{{ user.id }}" {% if administration.manager_id == user.id %}selected{% endif %}>
                        {{ user.get_full_name|default:user.username }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">تقرير العمليات اليومي</label>
                <select name="report_recipient_role"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    {% for value, label in form.fields.report_recipient_role.choices %}
                    <option value="{{ value }}"
                        {% if administration %}
                            {% if administration.report_recipient_role == value %}selected{% endif %}
                        {% elif form.report_recipient_role.value == value %}
                            selected
                        {% endif %}>
                        {{ label }}
                    </option>
                    {% endfor %}
                </select>
                <p class="text-xs text-slate-500 mt-1">يربط موظفي هذه الإدارة بتقرير المدير المحدد في إعدادات التقرير.</p>
            </div>

            {% include "components/setup_form_actions.html" %}
        </form>
    </div>
</div>
{% endblock %}
