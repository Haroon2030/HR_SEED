<style>
    .payroll-lines-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        overflow: hidden;
    }
    .payroll-lines-hd {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #e5e7eb;
    }
    .payroll-lines-hd h3 {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #111;
    }
    .payroll-tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--hr-table-body-size);
    }
    .payroll-tbl thead th {
        padding: 0.55rem 0.65rem;
        font-size: var(--hr-table-head-size);
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        border-bottom: 1px solid #e5e7eb;
        white-space: nowrap;
    }
    .payroll-tbl thead th.th-deduct {
        background: #fff5f5;
        color: #b91c1c;
    }
    .payroll-tbl thead th.th-earn {
        background: #f0fdf4;
        color: #047857;
    }
    .payroll-tbl thead th.th-net {
        background: #eff6ff;
        color: #1d4ed8;
    }
    .payroll-tbl tbody td {
        padding: 0.5rem 0.65rem;
        border-bottom: 1px solid #f3f4f6;
        vertical-align: middle;
    }
    .payroll-tbl tbody tr:hover {
        background: #fafafa;
    }
    .payroll-tbl tbody td.td-deduct {
        background: #fffbfb;
    }
    .payroll-tbl tbody td.td-earn {
        background: #fafff9;
    }
    .payroll-tbl tbody td.td-net {
        background: #f8fbff;
    }
    .payroll-tbl tfoot td {
        padding: 0.65rem;
        font-weight: 700;
        border-top: 2px solid #e5e7eb;
        background: #fafafa;
    }
    .payroll-tbl .col-num {
        text-align: left;
        white-space: nowrap;
    }
    .pay-money {
        display: inline-flex;
        align-items: baseline;
        gap: 0.2rem;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum";
        font-family: ui-monospace, "Segoe UI", Tahoma, sans-serif;
        font-weight: 700;
        line-height: 1.2;
    }
    .pay-money__val {
        letter-spacing: 0.02em;
    }
    .pay-money__cur {
        font-size: var(--hr-table-meta-size);
        font-weight: var(--hr-font-weight);
        opacity: 0.85;
    }
    .pay-money--neutral {
        color: #111;
    }
    .pay-money--neutral .pay-money__cur {
        color: #6b7280;
    }
    .pay-money--gross {
        color: #374151;
    }
    .pay-money--gross .pay-money__cur {
        color: #6b7280;
    }
    .pay-money--deduct {
        color: #dc2626;
    }
    .pay-money--deduct .pay-money__cur {
        color: #ef4444;
    }
    .pay-money--earn {
        color: #059669;
    }
    .pay-money--earn .pay-money__cur {
        color: #10b981;
    }
    .pay-money--net {
        color: #1d4ed8;
        font-size: var(--hr-table-compact-size);
    }
    .pay-money--net .pay-money__cur {
        color: #3b82f6;
    }
    .pay-money--empty {
        color: #9ca3af;
        font-weight: var(--hr-font-weight);
    }
    .pay-days {
        display: block;
        font-size: var(--hr-table-meta-size);
        font-weight: var(--hr-font-weight);
        color: #9ca3af;
        margin-top: 0.1rem;
    }

    /* ── أزرار بناء المسير (صف مستقل، عرض وارتفاع موحّد) ── */
    .hr-payroll-build-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid #e2e8f0;
    }

    .hr-payroll-build-actions__hint {
        font-size: 0.75rem;
        font-weight: var(--hr-font-weight);
        color: #64748b;
        flex: 1 1 auto;
        min-width: 8rem;
    }

    .hr-payroll-build-actions__group {
        display: grid;
        grid-template-columns: repeat(2, minmax(9.5rem, 1fr));
        gap: 0.5rem;
        width: 100%;
        max-width: 22rem;
        flex: 0 0 auto;
        margin-inline-start: auto;
    }

    .hr-payroll-build-actions__group--triple {
        grid-template-columns: repeat(3, minmax(7.5rem, 1fr));
        max-width: 34rem;
    }

    .hr-payroll-build-btn {
        min-height: 2.5rem;
        padding: 0.5rem 0.85rem;
        font-size: 0.8125rem;
        font-weight: 700;
        line-height: 1.2;
        border-radius: 0.5rem;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        white-space: nowrap;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .hr-payroll-build-btn__icon {
        width: 1rem;
        height: 1rem;
        flex-shrink: 0;
    }

    .hr-payroll-build-btn--primary {
        color: #fff;
        background: #2563eb;
        border-color: #1d4ed8;
        box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2);
    }

    .hr-payroll-build-btn--primary:hover:not(:disabled) {
        background: #1d4ed8;
    }

    .hr-payroll-build-btn--detailed {
        color: #3730a3;
        background: #eef2ff;
        border-color: #c7d2fe;
    }

    .hr-payroll-build-btn--detailed:hover:not(:disabled) {
        background: #e0e7ff;
        border-color: #a5b4fc;
    }

    .hr-payroll-build-btn--view {
        color: #0f766e;
        background: #f0fdfa;
        border-color: #99f6e4;
    }

    .hr-payroll-build-btn--view:hover:not(:disabled) {
        background: #ccfbf1;
        border-color: #5eead4;
    }

    .hr-payroll-build-btn--disabled,
    .hr-payroll-build-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
    }

    @media (max-width: 639px) {
        .hr-payroll-build-actions__group {
            max-width: none;
            margin-inline-start: 0;
        }
    }

    /* ── صفوف المسير + نافذة التفاصيل ── */
    .hr-payroll-run-row__head {
        display: flex;
        align-items: stretch;
        gap: 0;
        background: #fff;
    }

    .hr-payroll-run-row__main-btn {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex: 1;
        min-width: 0;
        padding: 0.75rem 0.85rem;
        background: transparent;
        border: 0;
        cursor: pointer;
        text-align: right;
        transition: background-color 0.15s ease;
    }

    .hr-payroll-run-row__main-btn:hover,
    .hr-payroll-run-row__main-btn.is-active {
        background: #f8fafc;
    }

    .hr-payroll-run-row__view {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 2.75rem;
        margin: 0.35rem 0.45rem 0.35rem 0;
        border: 1px solid #e2e8f0;
        border-radius: 0.55rem;
        background: #fff;
        color: #2563eb;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .hr-payroll-run-row__view:hover {
        background: #eff6ff;
        border-color: #93c5fd;
        color: #1d4ed8;
    }

    .hr-payroll-run-row__title {
        display: block;
        font-size: 0.9rem;
        font-weight: 800;
        color: #0f172a;
        line-height: 1.25;
    }

    .hr-payroll-run-row__meta {
        display: block;
        margin-top: 0.15rem;
        font-size: 0.72rem;
        font-weight: var(--hr-font-weight);
        color: #64748b;
        line-height: 1.3;
    }

    .hr-payroll-run-row__stats {
        align-items: center;
        gap: 0.85rem;
        margin-inline-start: auto;
    }

    .hr-payroll-run-row__stat {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.1rem;
        min-width: 4.5rem;
    }

    .hr-payroll-run-row__stat .lbl {
        font-size: 0.62rem;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.02em;
    }

    .hr-payroll-run-row__stat .val {
        font-size: 0.8rem;
        font-weight: 800;
        color: #334155;
    }

    .hr-payroll-run-row__badges {
        display: flex;
        align-items: center;
        gap: 0.35rem;
    }

    /* ── أزرار حفظ / إغلاق / تصدير ── */
    .hr-payroll-run-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
    }

    .hr-payroll-run-actions__hint {
        font-size: 0.75rem;
        font-weight: var(--hr-font-weight);
        color: #64748b;
        flex: 1 1 auto;
        min-width: 8rem;
    }

    .hr-payroll-run-actions__group {
        display: grid;
        grid-template-columns: repeat(3, minmax(7.5rem, 1fr));
        gap: 0.5rem;
        width: 100%;
        max-width: 34rem;
        flex: 0 0 auto;
        margin-inline-start: auto;
    }

    .hr-payroll-run-btn {
        min-height: 2.5rem;
        padding: 0.5rem 0.75rem;
        font-size: 0.8125rem;
        font-weight: 700;
        line-height: 1.2;
        border-radius: 0.5rem;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        white-space: nowrap;
        cursor: pointer;
        text-decoration: none;
        transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .hr-payroll-run-btn__icon {
        width: 1rem;
        height: 1rem;
        flex-shrink: 0;
    }

    .hr-payroll-run-btn--save {
        color: #1e40af;
        background: #eff6ff;
        border-color: #bfdbfe;
    }

    .hr-payroll-run-btn--save:hover:not(:disabled) {
        background: #dbeafe;
        border-color: #93c5fd;
    }

    .hr-payroll-run-btn--lock {
        color: #fff;
        background: #059669;
        border-color: #047857;
        box-shadow: 0 1px 2px rgba(5, 150, 105, 0.2);
    }

    .hr-payroll-run-btn--lock:hover:not(:disabled) {
        background: #047857;
    }

    .hr-payroll-run-btn--export {
        color: #065f46;
        background: #ecfdf5;
        border-color: #a7f3d0;
    }

    .hr-payroll-run-btn--export:hover {
        background: #d1fae5;
        border-color: #6ee7b7;
    }

    .hr-payroll-run-btn--disabled,
    .hr-payroll-run-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
        pointer-events: none;
    }

    @media (max-width: 639px) {
        .hr-payroll-run-actions__group {
            max-width: none;
            margin-inline-start: 0;
            grid-template-columns: 1fr;
        }
    }

    /* ── Hero + command layout + pipeline ── */
    .hr-payroll-hero {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1.2rem 1.35rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.07) 0%, rgba(255, 255, 255, 0.95) 52%, #fff 100%);
        border: 1px solid rgba(37, 99, 235, 0.12);
    }

    .hr-payroll-hero__top {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
    }

    .hr-payroll-hero__brand {
        display: flex;
        align-items: flex-start;
        gap: 0.85rem;
        min-width: 0;
        flex: 1 1 16rem;
    }

    .hr-payroll-hero__icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.85rem;
        background: linear-gradient(165deg, var(--hr-sidebar-bg, #3d7aad) 0%, var(--hr-sidebar-bg-soft, #356391) 100%);
        color: #fff;
        box-shadow: 0 8px 22px rgba(61, 122, 173, 0.28);
    }

    .hr-payroll-hero__icon i,
    .hr-payroll-hero__icon svg {
        color: #fff !important;
        stroke: #fff !important;
    }

    .hr-payroll-hero__title {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 800 !important;
        color: #0f172a;
        line-height: 1.25;
    }

    .hr-payroll-hero__subtitle {
        margin: 0.35rem 0 0;
        font-size: 0.8125rem;
        line-height: 1.55;
        color: #64748b;
        max-width: 38rem;
    }

    .hr-payroll-hero__period {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.85rem;
        font-size: 0.875rem;
        font-weight: 800 !important;
        color: #1e3a8a;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 0.65rem;
        flex-shrink: 0;
    }

    .hr-payroll-hero__stats {
        margin-top: 0.15rem;
    }

    .hr-payroll-hero .hr-stat-card {
        min-height: 5.25rem;
    }

    .hr-payroll-hero .hr-stat-card__inner {
        min-height: 5.25rem;
        padding: 0.85rem 0.95rem;
        gap: 0.75rem;
    }

    .hr-payroll-hero .hr-stat-card__value {
        font-size: 1.05rem;
        letter-spacing: -0.01em;
    }

    .hr-payroll-hero .hr-stat-card__label {
        font-size: 0.72rem;
        font-weight: 700 !important;
        letter-spacing: 0.01em;
    }

    .hr-payroll-hero .hr-stat-card__icon {
        width: 2.35rem;
        height: 2.35rem;
        border-radius: 0.75rem;
    }

    .hr-payroll-hero .hr-stat-card__icon svg {
        width: 1.1rem !important;
        height: 1.1rem !important;
    }

    .hr-payroll-tabs {
        border: 1px solid #e2e8f0;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }

    .hr-payroll-workspace {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .hr-payroll-command-layout {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .hr-payroll-page > .hr-payroll-panel--pipeline {
        border: 1px solid rgba(61, 122, 173, 0.14);
        box-shadow: 0 4px 18px rgba(61, 122, 173, 0.08);
    }

    .hr-payroll-page > .hr-payroll-panel--pipeline .hr-payroll-panel__head {
        background: linear-gradient(180deg, rgba(61, 122, 173, 0.08) 0%, #fafafa 100%);
    }

    .hr-payroll-panel--command {
        height: auto;
    }

    .hr-payroll-panel--command .hr-payroll-panel__head {
        background: linear-gradient(180deg, #f8fafc 0%, #fafafa 100%);
    }

    .hr-payroll-panel--pipeline {
        height: auto;
    }

    .hr-payroll-panel__head--compact {
        padding: 0.65rem 0.85rem;
    }

    .hr-payroll-panel__body--compact {
        padding: 0.75rem 0.85rem 0.85rem;
    }

    .hr-payroll-panel__desc {
        margin: 0.2rem 0 0;
        font-size: 0.6875rem;
        line-height: 1.45;
        color: #64748b;
    }

    .hr-payroll-panel__body--pipeline {
        padding: 0.75rem 0.85rem 0.85rem;
    }

    /* ── إجراءات المسير — أيقونات بسيطة ── */
    .hr-payroll-pipeline--icons {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
    }

    .hr-payroll-icon-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 0.55rem 0.65rem;
    }

    .hr-payroll-icon-action {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.28rem;
        min-width: 2.75rem;
    }

    .hr-payroll-icon-action__label {
        font-size: 0.625rem;
        font-weight: 700;
        line-height: 1.2;
        text-align: center;
        color: #64748b;
        white-space: nowrap;
        user-select: none;
    }

    .hr-payroll-icon-action:has(.is-disabled) .hr-payroll-icon-action__label,
    .hr-payroll-icon-action:has(:disabled) .hr-payroll-icon-action__label {
        opacity: 0.45;
    }

    .hr-payroll-icon-actions__form {
        display: inline-flex;
        margin: 0;
    }

    .hr-payroll-icon-actions__sep {
        width: 1px;
        height: 2.85rem;
        align-self: center;
        background: #e2e8f0;
        margin-inline: 0.1rem;
        flex-shrink: 0;
    }

    .hr-payroll-icon-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.45rem;
        height: 2.45rem;
        padding: 0;
        border-radius: 0.55rem;
        border: 1px solid #e2e8f0;
        background: #fff;
        color: var(--hr-sidebar-bg, #3d7aad);
        cursor: pointer;
        text-decoration: none;
        flex-shrink: 0;
        transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.12s ease;
    }

    .hr-payroll-icon-btn svg {
        stroke: currentColor !important;
        color: currentColor !important;
        flex-shrink: 0;
    }

    .hr-payroll-icon-btn--build i[data-lucide],
    .hr-payroll-icon-btn--rebuild i[data-lucide],
    .hr-payroll-icon-btn--save i[data-lucide],
    .hr-payroll-icon-btn--lock i[data-lucide],
    .hr-payroll-icon-btn--view i[data-lucide],
    .hr-payroll-icon-btn--export i[data-lucide],
    .hr-payroll-icon-btn--audit i[data-lucide],
    .hr-payroll-icon-btn--build svg,
    .hr-payroll-icon-btn--rebuild svg,
    .hr-payroll-icon-btn--save svg,
    .hr-payroll-icon-btn--lock svg,
    .hr-payroll-icon-btn--view svg,
    .hr-payroll-icon-btn--export svg,
    .hr-payroll-icon-btn--audit svg {
        color: #ffffff !important;
        stroke: #ffffff !important;
    }

    .hr-payroll-icon-btn--view,
    .hr-payroll-icon-btn--build,
    .hr-payroll-icon-btn--rebuild,
    .hr-payroll-icon-btn--save,
    .hr-payroll-icon-btn--lock,
    .hr-payroll-icon-btn--export,
    .hr-payroll-icon-btn--audit,
    .hr-payroll-icon-btn--audit-ok,
    .hr-payroll-icon-btn--audit-warn,
    .hr-payroll-icon-btn--audit-error {
        color: #ffffff !important;
        background: linear-gradient(165deg, var(--hr-sidebar-bg, #3d7aad) 0%, var(--hr-sidebar-bg-soft, #356391) 100%) !important;
        border-color: rgba(255, 255, 255, 0.18) !important;
        box-shadow: 0 2px 6px rgba(61, 122, 173, 0.22);
    }

    .hr-payroll-icon-btn--rebuild {
        background: linear-gradient(165deg, #64748b 0%, #475569 100%) !important;
        border-color: rgba(255, 255, 255, 0.18) !important;
        box-shadow: 0 2px 6px rgba(71, 85, 105, 0.22);
    }

    .hr-payroll-icon-btn--rebuild:hover:not(:disabled):not(.is-disabled) {
        background: linear-gradient(165deg, #738296 0%, #64748b 100%) !important;
        border-color: rgba(255, 255, 255, 0.28) !important;
        box-shadow: 0 4px 10px rgba(71, 85, 105, 0.28);
    }

    .hr-payroll-icon-btn--view:hover:not(:disabled):not(.is-disabled),
    .hr-payroll-icon-btn--build:hover:not(:disabled):not(.is-disabled),
    .hr-payroll-icon-btn--save:hover:not(:disabled):not(.is-disabled),
    .hr-payroll-icon-btn--lock:hover:not(:disabled):not(.is-disabled),
    .hr-payroll-icon-btn--export:hover:not(.is-disabled),
    .hr-payroll-icon-btn--audit:hover:not(:disabled):not(.is-disabled) {
        color: #ffffff !important;
        background: linear-gradient(165deg, #4688b8 0%, var(--hr-sidebar-bg, #3d7aad) 100%) !important;
        border-color: rgba(255, 255, 255, 0.28) !important;
        box-shadow: 0 4px 10px rgba(61, 122, 173, 0.28);
    }

    .hr-payroll-icon-btn:active:not(:disabled):not(.is-disabled) {
        transform: scale(0.96);
    }

    .hr-payroll-icon-btn__dot {
        position: absolute;
        top: 0.28rem;
        inset-inline-end: 0.28rem;
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 999px;
        border: 1.5px solid #fff;
    }

    .hr-payroll-icon-btn__dot--ok {
        background: #10b981;
    }

    .hr-payroll-icon-btn__dot--warn {
        background: #f59e0b;
    }

    .hr-payroll-icon-btn__dot--error {
        background: #f43f5e;
    }

    .hr-payroll-icon-btn.is-disabled,
    .hr-payroll-icon-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
        box-shadow: none;
    }

    /* ── خط سير المسير — بطاقات (legacy) ── */
    .hr-payroll-pipeline--pro {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 0.65rem;
        min-width: min(100%, 36rem);
    }

    .hr-payroll-flow {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0;
        position: relative;
        flex: 1 1 0;
        min-width: 0;
