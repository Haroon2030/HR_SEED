{% load custom_tags %}
<template x-teleport="body">
<div x-show="modalRunId !== null"
     x-cloak
     dir="rtl"
     class="hr-glass-modal-overlay hr-payroll-run-modal-overlay"
     @click.self="closeModal()"
     role="dialog"
     aria-modal="true"
     aria-label="تفاصيل المسير">
    <div class="hr-glass-modal hr-glass-modal--payroll-run relative flex flex-col shadow-2xl"
         @click.stop>
        {% for run in modal_runs %}
        <div x-show="modalRunId === {{ run.id }}"
             x-cloak
             class="flex flex-col min-h-0 flex-1 max-h-[92vh]">
            <div class="hr-glass-modal__head px-4 py-3 flex items-start justify-between gap-3 shrink-0 border-b border-slate-200">
                <div class="min-w-0">
                    <p class="text-xs font-bold text-primary-700 m-0 mb-1">تفاصيل المسير</p>
                    <h3 class="text-lg font-bold text-slate-900 m-0 truncate">{% if run.run_kind == 'consolidated' %}جميع الفروع{% else %}{{ run.branch.name }}{% endif %}</h3>
                    <p class="text-xs text-slate-500 mt-1 m-0">
                        {% if run.sponsorship %}{{ run.sponsorship.company_name }} · {% endif %}
                        {{ run.get_salary_mode_display }} · {{ run.period_label }}
                    </p>
                </div>
                <button type="button"
                        class="hr-glass-modal__close shrink-0"
                        @click="closeModal()"
                        aria-label="إغلاق">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-4 py-2 bg-slate-50 border-b border-slate-100 shrink-0">
                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-600">
                    <span><strong class="text-slate-800">{{ run.employees_count }}</strong> موظف</span>
                    <span>استحقاقات <strong class="text-emerald-700">{{ run.total_earnings|format_sar:"earn" }}</strong></span>
                    <span>خصومات <strong class="text-rose-700">{{ run.total_deductions|format_sar:"deduct" }}</strong></span>
                    <span>الصافي <strong class="text-primary-800">{{ run.total_net|format_sar:"net" }}</strong></span>
                    {% if run.status == 'draft' %}
                    <span class="px-2 py-0.5 text-xs font-bold rounded bg-amber-100 text-amber-800">مسودة</span>
                    {% elif run.status == 'locked' %}
                    <span class="px-2 py-0.5 text-xs font-bold rounded bg-emerald-100 text-emerald-800">مُغلق</span>
                    {% endif %}
                </div>
            </div>
            <div class="hr-glass-modal__body hr-glass-modal__content overflow-y-auto flex-1 min-h-0 p-3 sm:p-4">
                {% with run=run %}
                {% include "pages/payroll/_payroll_run_lines_table.html" %}
                {% endwith %}
            </div>
            <div class="hr-glass-modal__foot px-4 py-3 flex flex-wrap items-center justify-between gap-2 shrink-0 border-t border-slate-200">
                <a href="{% url 'web:view_payroll_run' run.id %}"
                   class="inline-flex items-center gap-1.5 text-sm font-bold text-primary-700 hover:text-primary-900">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    فتح صفحة المسير الكاملة
                </a>
                <button type="button"
                        class="px-4 py-2 text-sm font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg"
                        @click="closeModal()">
                    إغلاق
                </button>
            </div>
        </div>
        {% endfor %}
        <div x-show="modalRunId !== null && !modalRunIds.includes(modalRunId)"
             x-cloak
             class="p-8 text-center text-slate-500 text-sm">
            تعذّر تحميل تفاصيل المسير — أغلق ثم اضغط عرض مرة أخرى.
        </div>
    </div>
</div>
</template>
