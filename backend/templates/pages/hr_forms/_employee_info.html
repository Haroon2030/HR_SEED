{# بطاقة معلومات الموظف — تُستخدم في كل النماذج #}
<div class="section">
    <h3>بيانات الموظف</h3>
    <div class="info-grid">
        <div class="row"><span class="label">الاسم:</span><span class="value">{{ employee.name|default:"—" }}</span></div>
        <div class="row"><span class="label">الرقم الوظيفي:</span><span class="value">{{ employee.employee_number|default:"—" }}</span></div>
        <div class="row"><span class="label">رقم الهوية:</span><span class="value">{{ employee.id_number|default:"—" }}</span></div>
        <div class="row"><span class="label">الجنسية:</span><span class="value">{{ employee.nationality.name|default:"—" }}</span></div>
    </div>
</div>
