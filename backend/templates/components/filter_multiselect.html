{# name, items, selected_ids, field_class, select_id, aria_label, no_all, placeholder, require_selection #}
<select name="{{ name }}"
        id="{{ select_id|default:name }}"
        class="hr-filter-ms {{ field_class|default:'' }}"
        multiple
        data-all-label="{{ all_label|default:'الكل' }}"
        {% if no_all %}data-no-all="1"{% endif %}
        {% if placeholder %}data-placeholder="{{ placeholder }}"{% endif %}
        {% if require_selection %}data-require-selection="1"{% endif %}
        {% if single %}data-single="1"{% endif %}
        {% if count_unit %}data-count-unit="{{ count_unit }}"{% endif %}
        {% if panel_vw %}data-panel-vw="{{ panel_vw }}"{% endif %}
        {% if panel_vh %}data-panel-vh="{{ panel_vh }}"{% endif %}
        {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}>
    {% for item in items %}
    <option value="{{ item.pk }}"
        {% if selected_ids and item.pk in selected_ids %}selected{% endif %}>
        {% if item.name %}{% if item.code and item.code != item.name %}{{ item.code }} — {% endif %}{{ item.name }}{% elif item.company_name %}{{ item.company_name }}{% if item.code %} ({{ item.code }}){% endif %}{% else %}{{ item }}{% endif %}
    </option>
    {% endfor %}
</select>
<script defer src="/static/js/hr-multiselect.js?v=20260610-panel25w"></script>
