{# نسبة خصم التأمينات — قائمة منسدلة GOSI #}
{# حقل hidden واحد فقط يُرسل القيمة (يتجنب تضارب حقلين بنفس الاسم) #}
<div class="space-y-1.5">
    <label class="block text-xs font-bold text-slate-800">
        نسبة خصم التأمينات (%)
        <span class="block text-[10px] font-normal text-slate-500 mt-0.5">اختر من القائمة — للسعودي: 10.75 / 10.25 / 9.75</span>
    </label>
    {% if can_edit %}
    <input type="hidden"
           name="insurance_deduction_rate"
           :value="(insuranceRate === '' || insuranceRate === null || Number.isNaN(Number(insuranceRate))) ? '' : insuranceRate">
    <select x-model="insuranceRate"
            class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white font-mono"
            dir="ltr">
        <option value="">-- اختر --</option>
        <option value="10.75">10.75%</option>
        <option value="10.25">10.25%</option>
        <option value="9.75">9.75%</option>
        <option value="0">0%</option>
    </select>
    {% else %}
    <input type="hidden" name="insurance_deduction_rate" value="{{ rate|default:'' }}">
    <div class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm bg-slate-50 font-mono text-slate-700" dir="ltr">
        {{ rate|default:"—" }}{% if rate %}%{% endif %}
    </div>
    {% endif %}
</div>
