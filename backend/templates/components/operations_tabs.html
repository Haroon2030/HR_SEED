{# تبويبات مشتركة: طلبات العمليات ↔ طلبات التوظيف #}
<div class="hr-glass-panel hr-page-tabs rounded-xl overflow-hidden">
<nav class="hr-page-tabs__bar" role="tablist" aria-label="نوع الطلبات">
    <a href="{% url 'web:list_pending_actions' %}" role="tab"
       class="hr-tab-btn{% if request.resolver_match.url_name == 'list_pending_actions' %} is-active{% endif %}">
        <i data-lucide="list-checks" class="w-4 h-4"></i>
        <span>طلبات العمليات</span>
        {% if pending_actions_count %}<span class="hr-tab-badge">{{ pending_actions_count }}</span>{% endif %}
    </a>
    {% if request.user.is_superuser or request.user.managed_branches.exists %}
    <a href="{% url 'web:list_employment_requests' %}" role="tab"
       class="hr-tab-btn{% if request.resolver_match.url_name == 'list_employment_requests' %} is-active{% endif %}">
        <i data-lucide="clipboard-check" class="w-4 h-4"></i>
        <span>طلبات التوظيف</span>
    </a>
    {% endif %}
</nav>
</div>
