{# جدول ورديات شهري — يُستخدم داخل نافذة جدول الدوام فقط #}
<div class="hr-schedule-roster border rounded-lg">
    <div class="hr-schedule-roster__title px-4 py-3 border-b">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div class="min-w-0">
                <h4 class="text-sm sm:text-base font-bold flex flex-wrap items-center gap-2">
                    <i data-lucide="calendar-range" class="w-4 h-4 shrink-0"></i>
                    <span>جدول عملك لشهر</span>
                    <template x-if="editable">
                        <span class="hr-schedule-roster__period-controls inline-flex flex-wrap items-center gap-1.5">
                            <input type="month"
                                   class="hr-schedule-roster__month-input text-sm font-bold rounded-lg px-2 py-1"
                                   :value="boxYearMonthValue(box)"
                                   @input="setBoxYearMonthFromInput(box, $event.target.value)"
                                   min="2020-01"
                                   max="2100-12"
                                   aria-label="اختر الشهر والسنة">
                        </span>
                    </template>
                    <template x-if="!editable">
                        <span x-text="boxMonthLabel(box)"></span>
                    </template>
                </h4>
                <p class="text-[11px] mt-1 hr-schedule-roster__hint" x-show="editable" x-text="'الشهر المحدد: ' + boxMonthLabel(box)"></p>
            </div>
            <div class="flex flex-wrap items-center gap-2 shrink-0">
                <template x-if="editable">
                    <input type="text" x-model="box.shift_label"
                           placeholder="اكتب الوردية (مثال: 8ص–4م)"
                           class="hr-schedule-roster__shift hr-schedule-modal__input text-xs font-bold rounded-lg px-2 py-1.5 min-w-[9rem] w-full sm:w-52">
                </template>
                <template x-if="!editable">
                    <span class="text-xs font-bold px-2 py-1 rounded-lg hr-schedule-roster__shift-read" x-text="shiftShortLabel(box)"></span>
                </template>
                <span class="hr-schedule-roster__badge inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-bold">
                    <span x-text="workDaysCount(box)"></span> يوم دوام
                </span>
            </div>
        </div>
    </div>

    <div class="hr-schedule-roster__scroll overflow-x-auto">
        <table class="hr-schedule-roster__table w-full text-center text-xs border-collapse">
            <thead>
                <tr>
                    <template x-for="d in dayNumbers" :key="'wd-' + d">
                        <th class="hr-schedule-roster__weekday border font-bold leading-none"
                            :class="isDayInMonth(box, d) ? '' : 'hr-schedule-roster__weekday--inactive'">
                            <span class="hr-schedule-roster__weekday-text" x-text="weekdayForDay(box, d) || '—'"></span>
                        </th>
                    </template>
                </tr>
                <tr>
                    <template x-for="d in dayNumbers" :key="'num-' + d">
                        <th class="hr-schedule-roster__day-num border font-bold leading-none"
                            x-text="d"></th>
                    </template>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <template x-for="d in dayNumbers" :key="'cell-' + d">
                        <td class="hr-schedule-roster__cell border p-0 align-middle"
                            :class="{
                                'hr-schedule-roster__cell--inactive': !isDayInMonth(box, d),
                                'hr-schedule-roster__cell--off': getDayCode(box, d).toLowerCase() === 'off',
                                'hr-schedule-roster__cell--work': isWorkDayCode(getDayCode(box, d))
                            }">
                            <button type="button"
                                    class="hr-schedule-roster__code w-full flex items-center justify-center font-bold"
                                    :disabled="!editable || !isDayInMonth(box, d)"
                                    @click="cycleDayCode(box, d)"
                                    x-text="formatDayCode(getDayCode(box, d))"></button>
                        </td>
                    </template>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="hr-schedule-roster__legend px-3 py-1.5 border-t text-[10px] flex flex-wrap gap-3">
        <span><strong>✓</strong> دوام</span>
        <span><strong>off</strong> إجازة</span>
        <span class="hr-schedule-roster__legend-muted">— انقر على الخلية: فارغ ← ✓ ← off</span>
    </div>
</div>
