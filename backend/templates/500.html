{% extends "base_public.html" %}

{% block title %}خطأ في الخادم — نظام الموارد البشرية{% endblock %}

{% block content %}
<div class="login-shell">
    <div class="login-stage" role="main" aria-label="خطأ في الخادم">
        <section class="login-stage__form" aria-label="خطأ 500">
            <div class="login-stage__form-inner">
                <h2 class="login-stage__title">حدث خطأ غير متوقع</h2>
                <p class="login-stage__subtitle" style="margin-bottom:1.25rem;text-align:center;color:var(--login-muted,#64748b);">
                    نعتذر عن الإزعاج. تم تسجيل المشكلة وسيعمل فريق الدعم على معالجته.
                </p>
                <a href="/" class="login-form__submit" style="display:block;text-align:center;text-decoration:none;">
                    العودة للرئيسية
                </a>
            </div>
        </section>
    </div>
</div>
{% endblock %}
