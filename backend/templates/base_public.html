<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}نظام الموارد البشرية{% endblock %}</title>
    {% load static %}
    <link rel="preload" href="{% static 'fonts/cairo/SLXVc1nY6HkvangtZmpQdkhzfH5lkSscQyyS4J0.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link href="{% static 'fonts/cairo/cairo.css' %}" rel="stylesheet">
    <link rel="preload" href="{% static 'css/login.css' %}" as="style">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="login-body">
    {% if messages %}
    <div class="pub-messages" role="status">
        {% for message in messages %}
        <div class="pub-msg {% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script>
    (function () {
        var btn = document.getElementById('toggle-password');
        if (!btn) return;
        var input = document.getElementById('password');
        var eye = document.getElementById('icon-eye');
        var eyeOff = document.getElementById('icon-eye-off');
        btn.addEventListener('click', function () {
            var show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            eye.style.display = show ? 'none' : '';
            eyeOff.style.display = show ? '' : 'none';
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
